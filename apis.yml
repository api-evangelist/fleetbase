aid: fleetbase
url: https://raw.githubusercontent.com/api-evangelist/fleetbase/refs/heads/main/apis.yml
name: Fleetbase
kind: company
description: Fleetbase is an open-source, modular logistics and supply chain operating
  system (LSOS) for managing orders, drivers, vehicles, fleets, and last-mile delivery.
  Its RESTful API at https://api.fleetbase.io/v1 exposes orders, places, contacts,
  drivers, vehicles, fleets, zones, service rates, tracking, and webhooks, available
  both self-hosted under AGPL-3.0 and as a managed Fleetbase Cloud offering.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Logistics
- Fleet Management
- Supply Chain
- Last Mile Delivery
- Open Source
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
