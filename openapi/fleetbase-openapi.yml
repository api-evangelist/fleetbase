  /fleets:
    get:
      operationId: listFleets
      tags:
        - Fleets
      summary: List fleets
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: A list of fleets.
          content:
            application/json:
              schema:
                type: array
                items:
